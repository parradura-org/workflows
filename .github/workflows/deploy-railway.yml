name: Deploy Railway

on:
  workflow_call:
    inputs:
      service:
        type: string
        required: true
        description: 'Nombre del servicio en Railway'
      environment:
        type: string
        default: 'production'
    secrets:
      RAILWAY_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install --global @railway/cli
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ inputs.service }} --environment ${{ inputs.environment }}
